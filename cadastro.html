<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Move+</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <div class="left_cadastro">
            <img src="img/cadastro.png">
        </div>

        <div class="right_cadastro">

            <div class="formulario_cadastro">

                <img src="img/logo2.png" alt="Move+" class="logo_login_cadastro">

                <h2>Cadastro</h2>
                
                <label>Nome completo</label>
                <input type="text" placeholder="nome completo">

                <label>Data de Nascimento</label>
                <input type="date" placeholder="dd/mm/aaaa">

                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com">

                <label>Telefone</label>
                <input type="tel" placeholder="(xx) xxxxx-xxxx">

                <label>Senha</label>
                <input type="password" placeholder="••••••••">

                <div class="opcoes_cadastro">
                    <label>
                        <input type="checkbox">
                        Lembrar de mim
                    </label>

                <a href="pagamento.html" class="botao_cadastro">Finalizar Cadastro</a>

            </div>

        </div>

</body>

</html>
