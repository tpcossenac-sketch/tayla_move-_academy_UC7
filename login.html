<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Move+</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="left">
        <a href="index.html" class="back">← Voltar para o site</a>
    </div>

    <div class="right">
        <div class="form-container">
            <div class="logo">move+</div>
            <p class="subtitle">
                Bem-vindo(a) de volta!<br>
                Faça login para acessar sua conta
            </p>

            <label>E-mail</label>
            <input type="email" placeholder="seu@email.com">

            <label>Senha</label>
            <input type="password" placeholder="••••••••">

            <div class="options">
                <span><input type="checkbox"> Lembrar de mim</span><br>
                <a href="#">Esqueci a senha</a>
            </div>

        <button>Entrar</button>
    </div>
</div>

</body>
</html>
